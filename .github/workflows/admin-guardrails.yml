name: admin-guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  admin-guardrails:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run admin guardrail tests
        run: flutter test test/admin_profile_guardrails_test.dart test/app_smoke_test.dart
